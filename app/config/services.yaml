parameters:
    faker.locale: 'en_US'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    _instanceof:
        Smile\GdprDump\Configuration\Parser\Parser:
            tags: ['config.parser']
        Smile\GdprDump\Converter\Converter:
            shared: false # the converter factory uses the container to create new instances
            tags: ['converter'] # used by ConverterAliasPass to create aliases for data converters
        Smile\GdprDump\Phar\Minify\Minifier:
            tags: ['compiler.minifier']
        Symfony\Component\Console\Command\Command:
            public: true # used by Kernel

    Smile\GdprDump\:
        resource: '../../src/'
        exclude:
            - '../../src/Kernel.php'
            - '../../src/Console/Application.php'

    Smile\GdprDump\Console\Command\CompileCommand:
        $defaultLocale: '%faker.locale%'

    Smile\GdprDump\Configuration\Loader\ConfigLoader:
        public: true # used by functional tests

    Smile\GdprDump\Configuration\Parser\ParserResolver:
        arguments:
            $parsers: !tagged_iterator config.parser

    Smile\GdprDump\Configuration\EventListener\VersionListener:
         tags:
             - { name: 'kernel.event_listener', method: 'onResourceParse' } # ParseResourceEvent
             - { name: 'kernel.event_listener', method: 'onResourceMerge' } # MergeResourceEvent
             - { name: 'kernel.event_listener', method: 'onConfigParsed' } # ConfigParsedEvent

    Smile\GdprDump\Configuration\EventListener\EnvVarListener:
        tags: [{ name: 'kernel.event_listener', priority: 30 }] # Must be triggered first

    Smile\GdprDump\Configuration\EventListener\DatabaseUrlListener:
        tags: [{ name: 'kernel.event_listener', priority: 20 }] # Must be triggered before table names listener

    Smile\GdprDump\Configuration\EventListener\DumpOutputListener:
        tags: ['kernel.event_listener']

    Smile\GdprDump\Dumper\MysqlDumperFactory:
        public: true # used by functional tests

    Smile\GdprDump\Dumper\EventListener\FakerLocaleListener:
        tags:
            - { name: 'kernel.event_listener', priority: 10 } # Must be triggered before data converter listener

    Smile\GdprDump\Dumper\EventListener\DataConverterListener:
        tags: ['kernel.event_listener']

    Smile\GdprDump\Dumper\EventListener\TableFilterListener:
        tags: ['kernel.event_listener']

    Smile\GdprDump\Faker\FakerService:
        public: true # used by functional tests
        arguments:
            $locale: '%faker.locale%'

    Smile\GdprDump\Phar\Minify\MinifierResolver:
        arguments:
            $minifiers: !tagged_iterator compiler.minifier
